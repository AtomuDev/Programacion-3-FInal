<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Food Store - Carrito de Compras">
    <meta name="author" content="Abel Tomás">
    <link rel="stylesheet" href="../../../styles/base.css">
    <link rel="stylesheet" href="../../../styles/components.css">
    <link rel="stylesheet" href="./cart.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Poppins:wght@700&display=swap" rel="stylesheet">
    <title>Carrito - Food Store</title>
</head>
<body id="top">

    <!-- Header -->
    <header class="header">
        <div class="container">
            <a href="/src/pages/store/home/home.html" class="header__title-link">
                <h1 class="header__title">Food Store</h1>
            </a>
            <nav class="header__nav">
                <a href="/src/pages/store/home/home.html">← Volver al catálogo</a>
            </nav>
        </div>
    </header>

    <!-- Contenido principal -->
    <main class="main">
        <div class="main__header">
            <h2 class="main__title">Mi Carrito</h2>
        </div>

        <div class="main__body">

            <!-- Lista de productos -->
            <div class="cart-list">
                <div id="contenedor-carrito"></div>
                <p id="carrito-vacio" style="display:none">No hay productos en el carrito.</p>
            </div>

            <!-- Resumen del pedido -->
            <aside class="order-summary" id="order-summary">
                <h3 class="order-summary__title">Resumen del pedido</h3>
                <div class="order-summary__row">
                    <span>Subtotal</span>
                    <span id="summary-subtotal">$0</span>
                </div>
                <div class="order-summary__row">
                    <span>Envío</span>
                    <span id="summary-envio">$0</span>
                </div>
                <div class="order-summary__divider"></div>
                <div class="order-summary__row order-summary__row--total">
                    <span>Total</span>
                    <span id="summary-total">$0</span>
                </div>
                <button type="button" id="btn-vaciar" class="btn-vaciar">Vaciar carrito</button>
                <button type="button" class="btn-finalizar" id="btn-finalizar">Finalizar compra</button>
            </aside>

        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 Food Store. Todos los derechos reservados.</p>
            <address>
                Contacto: <a href="mailto:info@foodstore.com">info@foodstore.com</a>
            </address>
        </div>
    </footer>

    <!-- Script -->
    <script type="module" src="/src/main.ts"></script>
    <script type="module" src="./cart.ts"></script>
</body>
</html>
