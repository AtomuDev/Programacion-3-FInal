<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Food Store - Catálogo de Productos">
    <meta name="author" content="Abel Tomás">
    <link rel="stylesheet" href="../../../styles/base.css">
    <link rel="stylesheet" href="../../../styles/components.css">
    <link rel="stylesheet" href="./home.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Poppins:wght@700&display=swap" rel="stylesheet">
    <title>Food Store - Catálogo</title>
</head>
<body>

    <!-- Header -->
    <header class="header">
        <div class="container">
            <a href="/src/pages/store/home/home.html" class="header__title-link">
                <h1 class="header__title">Food Store</h1>
            </a>
            <nav class="header__nav">
                <a href="/src/pages/store/cart/cart.html" id="linkCarrito">Carrito</a>
                <a href="/src/pages/admin/home/admin.html" id="linkAdmin">Administración</a>
                <button type="button" id="logoutButton">Cerrar Sesión</button>
            </nav>
        </div>
    </header>

    <!-- Layout: sidebar + main -->
    <div class="layout">

        <!-- Barra lateral -->
        <aside class="categories">
            <h2 class="categories__title">Categorías</h2>
            <ul id="lista-categorias" class="categories__list"></ul>
        </aside>

        <!-- Contenido principal -->
        <main class="main">

            <!-- Buscador -->
            <div class="main__search-bar">
                <input type="text" id="buscador" placeholder="Buscar productos...">
            </div>

            <!-- Grilla de productos -->
            <section class="main__section">
                <div class="main__section-header">
                    <h2 class="main__title">Productos Destacados</h2>
                </div>
                <div id="contenedor-productos" class="main__products"></div>
            </section>

        </main>
    </div>

    <!-- Pie de página -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 Food Store. Todos los derechos reservados.</p>
            <address>
                Contacto: <a href="mailto:info@foodstore.com">info@foodstore.com</a>
            </address>
        </div>
    </footer>

    <!-- Script -->
    <script type="module" src="/src/main.ts"></script>
    <script type="module" src="./home.ts"></script>
</body>
</html>
