<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Food Store - Login">
    <meta name="author" content="Abel Tomás">
    <link rel="stylesheet" href="../../../styles/base.css">
    <link rel="stylesheet" href="./login.css">
    <title>Login - Food Store</title>
</head>
<body>
    <!-- Main -->
    <main class="container">
        <form class="login-form" id="form">
            <h1>Food Store</h1>
            <h2>Iniciar Sesión</h2>

            <label for="email">Email</label>
            <input type="email" id="email" name="email" required placeholder="ejemplo@gmail.com">

            <label for="password">Contraseña</label>
            <input type="password" id="password" name="password" required placeholder="Mínimo 8 caracteres">

            <button type="submit">Ingresar</button>

            <p>
                ¿No tenés cuenta? <a href="/src/pages/auth/registro/registro.html" class="register-link">Registrate acá</a>
            </p>
        </form>
    </main>

    <!-- Script -->
    <script type="module" src="/src/main.ts"></script>
    <script type="module" src="./login.ts"></script>
</body>
</html>
