<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Food Store - Registro">
    <meta name="author" content="Abel Tomás">
    <link rel="stylesheet" href="../../../styles/base.css">
    <link rel="stylesheet" href="../login/login.css">
    <title>Registro - Food Store</title>
</head>
<body>
    <!-- Main -->
    <main class="container">
        <form class="login-form" id="formRegistro">
            <h1>Food Store</h1>
            <h2>Crear cuenta</h2>

            <label for="email">Email</label>
            <input type="email" id="email" name="email" required placeholder="ejemplo@gmail.com" autocomplete="off">

            <label for="password">Contraseña</label>
            <input type="password" id="password" name="password" required placeholder="Mínimo 8 caracteres" autocomplete="off">

            <button type="submit">Registrarse</button>

            <p>
                ¿Ya tenés cuenta? <a href="/src/pages/auth/login/login.html" class="register-link">Iniciá sesión</a>
            </p>
        </form>
    </main>

    <!-- Script -->
    <script type="module" src="/src/main.ts"></script>
    <script type="module" src="./registro.ts"></script>
</body>
</html>
