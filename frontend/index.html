<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Trabajo Integrador Programación III - Food Store">
    <meta name="author" content="Abel Tomás">
    <link rel="stylesheet" href="css/base.css">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Poppins:wght@700&display=swap" rel="stylesheet">
    <title>Food Store - Catálogo</title>
</head>
<body id="top">
    <!-- Header -->
    <header class="header">
        <h1 class="header__title">Food Store</h1>
        <nav class="header__nav">
            <a href="#">Inicio</a>
            <a href="#">Mis Pedidos</a>
            <a href="#">Carrito</a>
            <a href="admin.html">Panel Admin</a>
        </nav>

    <!-- Barra lateral -->
    <aside class="categories">
        <h2 class="categories__title">Categorías</h2>
        <ul id="lista-categorias" class="categories__list"></ul>
    </aside>

    <!-- Contenido principal -->
    <main class="main">

        <form method="get" class="main__search-bar">
            <input type="text" name="buscarProducto" placeholder="Buscar productos...">

        <!-- Grilla de productos -->
        <h2 class="main__title">Productos Destacados</h2>
        <section id="contenedor-productos" class="main__products"></section>
    </main>

    <!-- Pie de página -->

        <a href="#top">Volver arriba</a>

        <address>
            Contacto: <a href="mailto:info@foodstore.com">info@foodstore.com</a>
        </address>
    </footer>

    <!-- Scripts -->
     <script src="./js/data.js"></script>
